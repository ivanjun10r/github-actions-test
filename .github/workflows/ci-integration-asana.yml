name: Create and Update Asana task

on:
  issues:
    types: [opened, edited, closed]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue or PR number to sync retroactively to Asana'
        required: true

jobs:
    create_update_asana_task:
        runs-on: ubuntu-latest
        permissions:
          issues: write
          pull-requests: write
          contents: read
        steps:
            - uses: actions/checkout@v3
            - uses: Thalocan-TRI/integration-asana-action@v3
              with:
                ASANA_WORKSPACE_ID: '1213362407219558'
                ASANA_PROJECT_ID: '1214917633635919'
                ASANA_SECTION_TO_DO: '1214917526162393'
                ASANA_SECTION_DOING: '1214917526162396'
                ASANA_SECTION_DONE: '1214917635404377'
                ASANA_CUSTOM_FIELD_STATUS_ID: '1205880144741940'
                ASANA_CUSTOM_FIELD_STATUS_IN_PROGRESS_ID: '1205880144741943'
                ASANA_CUSTOM_FIELD_STATUS_RESOLVED_ID:  '1205880144741941'
                ASANA_CUSTOM_FIELD_STATUS_ISSUE_ID: '1205880144741942'
                ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}

              env:
                ASANA_PAT: ${{ secrets.ASANA_PAT }}
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
